{% extends 'core/base.html' %}
{% block title %}Log In | {% endblock title %}

{% block content %}
  <h1 class="title">Log In</h1>
  <form action="." method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="field">
          <div class="control">
              <button class="button is-dark is-upparcase">Log In!</button>
          </div>
      </div>

  </form>
{% endblock content %}
